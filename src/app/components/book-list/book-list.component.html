<h2>Books</h2>

<div>
  <label>Search: </label>
  <input [(ngModel)]="searchTerm" (input)="onSearch()" placeholder="search by title">
</div>

<br>

<p>Showing {{ books.length }} book(s)</p>

<button (click)="toggleDescriptions()">
  {{ showDescriptions ? 'Hide Descriptions' : 'Show Descriptions' }}
</button>

<ul>
  <li *ngFor="let book of books">
    <strong>{{ book.title }}</strong> — {{ book.author }}
    <span *ngIf="showDescriptions"> | {{ book.description | truncate:40 }}</span>
  </li>
</ul>

<hr>

<h3>Add a New Book</h3>
<div>
  <label>Title: </label>
  <input [(ngModel)]="newTitle" placeholder="title">
</div>
<div>
  <label>Author: </label>
  <input [(ngModel)]="newAuthor" placeholder="author">
</div>
<div>
  <label>Description: </label>
  <input [(ngModel)]="newDescription" placeholder="description">
</div>
<br>
<button (click)="addBook()">Add</button>

<p *ngIf="message">{{ message }}</p>
